<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAILed IT | Customers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/fe2.css" />
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>NAILED<span>IT</span></h2>
    <ul>
      <li><a href="./index.html"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="./pos.html"><i class="fas fa-cash-register"></i> Go to POS</a></li>
      <li><a href="./product.html"><i class="fas fa-tools"></i> Manage Products</a></li>
      <li><a href="./transactions.html"><i class="fas fa-receipt"></i> View Transactions</a></li>
      <li><a href="./stock-movements.html"><i class="fas fa-right-left"></i> View Stock Movements</a></li>
      <li><a href="./customer.html" class="active"><i class="fas fa-users"></i> Customers</a></li>
      <li><a href="./login.html" id="logoutLink"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="header">
      <div>
        <h1>Customers</h1>
        <p>Manage customer profiles and loyalty points.</p>
      </div>
    </div>

    <section class="table-section customer-section">
      <div class="table-header customer-header">
        <h3>Customer List</h3>

        <div class="customer-controls">
          <input type="text" id="searchInput" placeholder="Search by name or phone..." />
          <button class="view-link" id="reloadBtn" type="button">Reload</button>
        </div>
      </div>

      <!-- Optional Add Form -->
      <div class="customer-form-wrap">
        <h4>Add Customer</h4>
        <div class="customer-form-grid">
          <input type="text" id="fullName" placeholder="Full Name" />
          <input type="text" id="phone" placeholder="Phone Number" />
          <input type="email" id="email" placeholder="Email Address" />
          <button class="view-link" id="addCustomerBtn" type="button">Add Customer</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Loyalty Points</th>
          </tr>
        </thead>
        <tbody id="customerTableBody"></tbody>
      </table>

      <p id="customerMsg" class="tx-message"></p>
    </section>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/customer.js"></script>
</body>
</html>
