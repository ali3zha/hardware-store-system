<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Movements | NAILed IT</title>

  <link rel="stylesheet" href="css/fe1.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="sidebar">
    <h2>NAILED<span>IT</span></h2>
    <ul>
      <li><a href="./index.html"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="pos.html"><i class="fas fa-cash-register"></i> Go to POS</a></li>
      <li><a href="product.html"><i class="fas fa-tools"></i> Manage Products</a></li>
      <li><a href="./category.html"><i class="fas fa-layer-group"></i> Category</a></li>
      <li><a href="transactions.html"><i class="fas fa-receipt"></i> View Transactions</a></li>
      <li><a href="stock-movements.html" class="active"><i class="fas fa-exchange-alt"></i> View Stock Movements</a></li>
      <li><a href="./login.html" id="logoutLink"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
    </ul>
  </div>

  <div class="page">
    <div class="page-header">
      <h1>Stock Movements</h1>
      <p>Tracking inventory flow in Philippine Pesos (₱).</p>
    </div>

    <div class="card" style="padding: 20px; margin-bottom: 25px; background: linear-gradient(135deg, #ff8a63 0%, #ee4d2d 100%); border: 1px solid #ef6a4e;">
      <div style="display: flex; gap: 15px; flex-wrap: wrap;">
        <div style="flex: 2; min-width: 250px;">
          <input id="movementSearch" type="text" placeholder="Search by Product Name or ID...">
        </div>

        <select id="typeFilter" style="flex: 1;">
          <option value="">All Types</option>
          <option value="Restock">Restock</option>
          <option value="Sale">Sale</option>
          <option value="Adjustment">Adjustment</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>PRODUCT DETAILS</th>
            <th>TYPE</th>
            <th>QTY CHANGE</th>
            <th>PRICE</th>
            <th>REASON</th>
            <th>STATUS</th>
            <th>DATE & TIME</th>
          </tr>
        </thead>

        <tbody id="movementTableBody">
          <tr>
            <td colspan="7">Loading stock movements...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="js/stock-movements.js"></script>
</body>
</html>
