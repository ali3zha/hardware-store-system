<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Movements | NAILed IT</title>
  <link rel="stylesheet" href="css/fe1.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="sidebar">
    <div class="logo">
      <h2>NAIL<span>ed</span> IT</h2>
    </div>
    <ul>
      <li><a href="index.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
      <li><a href="pos.html"><i class="fas fa-cash-register"></i> Go to POS</a></li>
      <li><a href="product.html"><i class="fas fa-tools"></i> Manage Products</a></li>
      <li><a href="transactions.html"><i class="fas fa-receipt"></i> View Transactions</a></li>
      <li><a href="stock-movements.html" class="active"><i class="fas fa-exchange-alt"></i> View Stock Movements</a></li>
      <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </div>

  <div class="page">
    <div class="page-header">
      <h1>Stock Movements</h1>
      <p>Tracking inventory flow in Philippine Pesos (₱).</p>
    </div>

    <div class="card" style="padding: 15px; margin-bottom: 25px;">
      <div style="display: flex; gap: 15px; flex-wrap: wrap;">
        <div style="flex: 2; min-width: 200px;">
          <input id="movementSearch" type="text" placeholder="Search by Product Name or ID..." style="width: 100%; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px;">
        </div>
        <select id="typeFilter" style="flex: 1; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px;">
          <option value="">All Types</option>
          <option value="Restock">Restock</option>
          <option value="Sale">Sale</option>
          <option value="Adjustment">Adjustment</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Product Details</th>
            <th>Type</th>
            <th>Qty Change</th>
            <th>Price</th>
            <th>Reason</th>
            <th>Date & Time</th>
          </tr>
        </thead>
        <tbody id="movementTableBody">
          </tbody>
      </table>
    </div>
  </div>

  <script src="js/stock-movements.js"></script>
</body>
</html>
