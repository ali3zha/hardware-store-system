<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discounts | NAILed IT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/fe2.css" />
</head>
<body>

  <div class="sidebar">
    <h2>NAILED<span>IT</span></h2>
    <ul>
      <li><a href="./index.html"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="./pos.html"><i class="fas fa-cash-register"></i> Go to POS</a></li>
      <li><a href="./product.html"><i class="fas fa-tools"></i> Manage Products</a></li>
      <li><a href="./transactions.html"><i class="fas fa-receipt"></i> View Transactions</a></li>
      <li><a href="./stock-movements.html"><i class="fas fa-right-left"></i> View Stock Movements</a></li>
      <li><a href="./discount.html" class="active"><i class="fas fa-tags"></i> Discounts</a></li>
      <li><a href="./login.html" id="logoutLink"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
    </ul>
  </div>

  <div class="main">
    <div class="header">
      <div>
        <h1>Discounts</h1>
        <p>Manage and view promotional discount rules.</p>
      </div>
    </div>

    <section class="table-section">
      <div class="table-header discount-header">
        <h3>Discount List</h3>

        <div class="filter-wrap">
          <label class="checkbox-wrap">
            <input type="checkbox" id="activeOnlyCheckbox" />
            Show Active Only
          </label>

          <button type="button" class="view-link" id="reloadDiscountsBtn">Reload</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Value</th>
            <th>Valid From</th>
            <th>Valid Until</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="discountBody">
          <!-- Filled by JS -->
        </tbody>
      </table>

      <p id="discountMessage" class="tx-message"></p>
    </section>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/discount.js"></script>
</body>
</html>
