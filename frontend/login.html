<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hardware Store - Login</title>
  <link rel="stylesheet" href="./css/fe2.css" />
</head>

<body>
  <main class="login-page">
    <section class="login-card card">
      <h1 class="title" style="text-align:center;">Welcome Back</h1>
      <p class="subtitle" style="text-align:center;">Sign in to Hardware Store System</p>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Enter your username" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter your password" required />
        </div>

        <button class="btn" id="loginBtn" type="submit" style="width:100%; margin-top:14px;">
          Login
        </button>

        <p id="status" class="status"></p>
      </form>
    </section>
  </main>

  <script src="./js/login.js"></script>
</body>
</html>
