<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAILed IT | POS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/fe2.css" />
</head>
<body>
  <div class="sidebar">
    <h2>NAILED<span>IT</span></h2>
    <ul>
      <li><a href="./index.html"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="./pos.html" class="active"><i class="fas fa-cash-register"></i> Go to POS</a></li>
      <li><a href="./product.html"><i class="fas fa-tools"></i> Manage Products</a></li>
        <li><a href="./category.html"><i class="fas fa-layer-group"></i> Category</a></li>
      <li><a href="./transactions.html"><i class="fas fa-receipt"></i> View Transactions</a></li>
      <li><a href="./stock-movements.html"><i class="fas fa-right-left"></i> View Stock Movements</a></li>
      <li><a href="./login.html" id="logoutLink"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
    </ul>
  </div>

  <div class="main">
    <div class="header">
      <div>
        <h1>POS</h1>
        <p>Checkout and create a sale.</p>
      </div>
    </div>

    <div class="pos-grid">
      <section class="panel">
        <div class="panel-header">
          <h3>Products</h3>
          <button class="btn" id="loadProductsBtn" type="button">Load Products</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Qty</th>
              <th>Add</th>
            </tr>
          </thead>
          <tbody id="productsBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h3>Cart</h3>
        </div>

        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Qty</th>
              <th>Unit</th>
              <th>Line</th>
              <th>Remove</th>
            </tr>
          </thead>
          <tbody id="cartBody"></tbody>
        </table>

        <div class="totals">
          <div class="row"><span>Subtotal</span><b id="subtotalEl">0.00</b></div>
          <div class="row"><span>Discount</span><b id="discountEl">0.00</b></div>
          <div class="row"><span>Tax</span><b id="taxEl">0.00</b></div>
          <div class="row total-row"><span>Total</span><b id="totalEl">0.00</b></div>
        </div>

        <div class="form-grid">
          <label>
            Customer ID (optional)
            <input type="number" id="customerIdEl" min="1" placeholder="e.g. 1" />
          </label>

          <label>
            Discount ID (optional)
            <input type="number" id="discountIdEl" min="1" placeholder="e.g. 1" />
          </label>

          <label class="full">
            Amount Tendered
            <input type="number" id="tenderedEl" min="0" step="0.01" placeholder="e.g. 1000" />
          </label>
        </div>

        <button class="btn full" id="checkoutBtn" type="button">Checkout</button>
        <p id="saleMessage" class="message"></p>
      </section>
    </div>
  </div>

  <script>
    document.getElementById("logoutLink")?.addEventListener("click", () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
    });
  </script>
  <script src="./js/pos.js"></script>
</body>
</html>
