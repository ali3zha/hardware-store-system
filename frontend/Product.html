<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | NAILed IT</title>
  <link rel="stylesheet" href="css/fe1.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="sidebar">
    <h2>NAIL<span>ed</span> IT</h2>
    <ul>
      <li><a href="index.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
      <li><a href="pos.html"><i class="fas fa-cash-register"></i> Go to POS</a></li>
      <li><a href="product.html" class="active"><i class="fas fa-tools"></i> Manage Products</a></li>
      <li><a href="transactions.html"><i class="fas fa-receipt"></i> View Transactions</a></li>
      <li><a href="stock-movements.html"><i class="fas fa-exchange-alt"></i> View Stock Movements</a></li>
      <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </div>

  <div class="page">
    <div class="page-header">
      <h1>Inventory Management</h1>
      <p>Manage your hardware products and pricing in Pesos (₱).</p>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 20px;"><i class="fas fa-plus-circle"></i> Add / Edit Product</h2>
      <form id="productForm" class="form-grid">
        <input id="productName" placeholder="Product Name" required>
        <input id="productSku" placeholder="SKU" required>
        <div class="currency-input">
          <span class="currency-symbol">₱</span>
          <input id="productPrice" type="number" step="0.01" placeholder="0.00" required>
        </div>
        <input id="productStock" type="number" placeholder="Stock Qty" required>
        <input id="productLowThreshold" type="number" value="10" placeholder="Alert Level">
        <select id="productCategory" required><option value="">Category</option></select>
        <select id="productSupplier" required><option value="">Supplier</option></select>
        <button type="submit" id="submitBtn">Save Product</button>
      </form>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>SKU</th>
            <th>Category</th>
            <th>Price (₱)</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="js/product.js"></script>
</body>
</html>
