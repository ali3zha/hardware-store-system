<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | NAILed IT</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/fe1.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

  <div class="sidebar">
    <h2>NAILED<span>IT</span></h2>
    <ul>
      <li><a href="./index.html"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="./pos.html"><i class="fas fa-cash-register"></i> Go to POS</a></li>
      <li><a href="./product.html" class="active"><i class="fas fa-tools"></i> Manage Products</a></li>
      <li><a href="./category.html"><i class="fas fa-layer-group"></i> Category</a></li>
      <li><a href="./transactions.html"><i class="fas fa-receipt"></i> View Transactions</a></li>
      <li><a href="./stock-movements.html"><i class="fas fa-right-left"></i> View Stock Movements</a></li>
      <li><a href="./login.html" id="logoutLink"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
    </ul>
  </div>

  <div class="main page">
    <div class="page-header">
      <h1>Inventory Management</h1>
      <p>Manage your hardware products and pricing in Pesos (₱).</p>
    </div>

    <div class="card">
      <h2 class="section-title"><i class="fas fa-plus-circle"></i> Add / Edit Product</h2>

      <form id="productForm" class="form-grid">
        <input id="productName" placeholder="Product Name" required />
        <input id="productSku" placeholder="SKU" required />

        <div class="currency-input">
          <span class="currency-symbol">₱</span>
          <input id="productPrice" type="number" step="0.01" placeholder="0.00" required />
        </div>

        <input id="productStock" type="number" placeholder="Stock Qty" required />
        <input id="productLowThreshold" type="number" value="10" placeholder="Alert Level" />

        <select id="productCategory" required>
          <option value="">Category</option>
        </select>

        <select id="productSupplier" required>
          <option value="">Supplier</option>
        </select>

        <button type="submit" id="submitBtn">Save Product</button>
      </form>
    </div>

    <!-- Search + Filters -->
    <div class="card filter-card">
      <div class="filter-row">
        <input id="searchInput" placeholder="Search by name / SKU..." />
        <select id="categoryFilter">
          <option value="">All Categories</option>
        </select>
        <select id="supplierFilter">
          <option value="">All Suppliers</option>
        </select>
        <button id="resetFilterBtn" type="button">Reset</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>SKU</th>
            <th>Category</th>
            <th>Price (₱)</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
      </table>
      <p id="productMsg"></p>
    </div>
  </div>

  <script>
    document.getElementById("logoutLink")?.addEventListener("click", () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
    });
  </script>
  <script src="./js/api.js"></script>
  <script src="./js/product.js"></script>
</body>
</html>
