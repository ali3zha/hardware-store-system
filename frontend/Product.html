<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | NAILed IT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/fe1.css" />
</head>
<body>
  <div class="sidebar">
    <h2>NAILED<span>IT</span></h2>
    <ul>
      <li><a href="./index.html"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="./pos.html"><i class="fas fa-cash-register"></i> Go to POS</a></li>
      <li><a href="./product.html" class="active"><i class="fas fa-tools"></i> Manage Products</a></li>
      <li><a href="./category.html"><i class="fas fa-layer-group"></i> Category</a></li>
      <li><a href="./transactions.html"><i class="fas fa-receipt"></i> View Transactions</a></li>
      <li><a href="./stock-movements.html"><i class="fas fa-right-left"></i> View Stock Movements</a></li>
      <li><a href="./login.html" id="logoutLink"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
    </ul>
  </div>

  <main class="main page">
    <div class="page-header">
      <h1>Inventory Management</h1>
      <p>Manage products, stock, and pricing.</p>
    </div>

    <section class="card product-form-card">
      <h3 class="section-title"><i class="fas fa-plus-circle"></i> Add / Edit Product</h3>

      <form id="productForm" class="form-grid">
        <input id="name" type="text" placeholder="Product Name" required />
        <input id="sku" type="text" placeholder="SKU" required />

        <input id="price" type="number" step="0.01" min="0" placeholder="Selling Price" required />
        <input id="stock" type="number" min="0" placeholder="Stock Qty" required />
        <input id="reorder" type="number" min="0" placeholder="Reorder Level" value="10" required />

        <select id="categoryId" required>
          <option value="">Select Category</option>
        </select>

        <select id="supplierId" required>
          <option value="">Select Supplier</option>
        </select>

        <button type="submit" id="saveBtn">Save Product</button>
      </form>
      <p id="formStatus" class="status"></p>
    </section>

    <section class="card product-filter-card">
      <div class="filters">
        <input id="searchInput" type="text" placeholder="Search by name or SKU..." />
        <select id="categoryFilter">
          <option value="">All Categories</option>
        </select>
        <select id="supplierFilter">
          <option value="">All Suppliers</option>
        </select>
        <button id="resetFilterBtn" type="button" class="btn-secondary">Reset</button>
      </div>
    </section>

    <section class="table-wrap card">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>SKU</th>
            <th>Category</th>
            <th>Price (₱)</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
      </table>
      <p id="tableStatus" class="status"></p>
    </section>
  </main>

  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/product.js"></script>
</body>
</html>
