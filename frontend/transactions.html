<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAILed IT | Transactions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/fe2.css" />
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>NAILED<span>IT</span></h2>
    <ul>
      <li><a href="./index.html"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a href="./pos.html"><i class="fas fa-cash-register"></i> Go to POS</a></li>
      <li><a href="./product.html"><i class="fas fa-tools"></i> Manage Products</a></li>
            <li><a href="./category.html"><i class="fas fa-layer-group"></i> Category</a></li>
      <li><a href="./transactions.html" class="active"><i class="fas fa-receipt"></i> View Transactions</a></li>
      <li><a href="./stock-movements.html"><i class="fas fa-right-left"></i> View Stock Movements</a></li>
      <li>
        <a href="./login.html" id="logoutLink">
          <i class="fas fa-right-from-bracket"></i> Logout
        </a>
      </li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="header">
      <div>
        <h1>Transactions</h1>
        <p>Sales history overview and quick details.</p>
      </div>
    </div>

    <section class="table-section">
      <div class="table-header transactions-header">
        <h3>Sales History</h3>

        <div class="filter-wrap">
          <div class="filter-group">
            <label for="fromDate">From</label>
            <input type="date" id="fromDate" />
          </div>
          <div class="filter-group">
            <label for="toDate">To</label>
            <input type="date" id="toDate" />
          </div>
          <button type="button" class="view-link" id="applyFilterBtn">Apply</button>
          <button type="button" class="ghost-btn" id="resetFilterBtn">Reset</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Sale ID</th>
            <th>Date</th>
            <th>User/Cashier</th>
            <th>Total</th>
            <th>Payment Method</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="transactionsBody">
            <script src="./js/api.js"></script>
            <script src="./js/pos.js"></script>
        </tbody>
      </table>

      <p id="txMessage" class="tx-message"></p>
    </section>
  </div>

  <script src="./js/transactions.js"></script>
  
</body>
</html>
